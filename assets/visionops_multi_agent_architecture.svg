<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1220" viewBox="0 0 2200 1220" role="img" aria-labelledby="title desc">
<title id="title">VisionOps Crew multi-agent architecture</title>
<desc id="desc">Architecture diagram showing the VisionOps Crew orchestrator, specialist agents, Hugging Face MCP, FiftyOne MCP, Jupyter MCP, ML Engineer skills, web sources, and generated artifacts.</desc>
<defs>
<marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#500000"/></marker>
<marker id="arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#500000"/></marker>
<marker id="arrow-gold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9b6a00"/></marker>
<linearGradient id="orch" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#500000"/><stop offset="100%" stop-color="#7a1f1f"/></linearGradient>
<style>
text{font-family:Arial,Inter,sans-serif;letter-spacing:0}
.title{font-size:52px;font-weight:700;fill:#500000}
.subtitle{font-size:23px;fill:#3c3c3c}
.section{font-size:18px;font-weight:700;fill:#500000}
.node-title{font-size:22px;font-weight:700;fill:#221f1f}
.node-subtitle{font-size:15px;font-weight:700;fill:#500000}
.node-text{font-size:14px;fill:#3c3c3c}
.small{font-size:13px;fill:#3c3c3c}
.label{font-size:13px;font-weight:700;fill:#500000}
.white-title{font-size:23px;font-weight:700;fill:#fff}
.white-subtitle{font-size:16px;font-weight:600;fill:#f7f4f0}
.white-text{font-size:15px;fill:#ffffff}
</style>
</defs>
<rect x="0" y="0" width="2200" height="1220" fill="#f7f4f0"/>
<text class="title" x="80" y="86">VisionOps Crew</text>
<text class="subtitle" x="82" y="122">ADK architecture: specialist agents, MCP tools, ML Engineer skills, Jupyter notebooks, and Antigravity artifact oversight</text>

<text class="section" x="80" y="178">ENTRY AND ORCHESTRATION</text>
<rect x="80" y="205" width="230" height="125" rx="8" fill="#ffffff" stroke="#d6d2c4" stroke-width="2"/>
<text class="node-title" x="105" y="250">User CV goal</text>
<text class="node-text" x="105" y="278">Task, dataset, model,</text>
<text class="node-text" x="105" y="302">constraints, desired output</text>

<rect x="370" y="205" width="240" height="125" rx="8" fill="#ffffff" stroke="#d6d2c4" stroke-width="2"/>
<text class="node-title" x="395" y="250">ADK Web / App</text>
<text class="node-text" x="395" y="278">Runs VisionOps Crew:</text>
<text class="node-text" x="395" y="302">visionops_crew</text>

<rect x="705" y="185" width="410" height="165" rx="12" fill="url(#orch)"/>
<text class="white-title" x="735" y="232">VisionOps Crew Orchestrator</text>
<text class="white-subtitle" x="735" y="260">visionops_orchestrator</text>
<text class="white-text" x="735" y="292">Plans, reasons, routes specialists,</text>
<text class="white-text" x="735" y="318">preserves context, and synthesizes</text>
<text class="white-text" x="735" y="344">one coherent CV answer.</text>

<rect x="1210" y="185" width="340" height="165" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-title" x="1238" y="232">Antigravity Tool</text>
<text class="node-subtitle" x="1238" y="260">run_antigravity_agent</text>
<text class="node-text" x="1238" y="292">Direct callable orchestrator tool</text>
<text class="node-text" x="1238" y="318">for code, images, reports,</text>
<text class="node-text" x="1238" y="344">notebooks, and artifacts</text>

<rect x="1660" y="185" width="360" height="165" rx="8" fill="#3c3c3c" stroke="#202020" stroke-width="2"/>
<text class="white-title" x="1688" y="232">Unified CV answer</text>
<text class="white-subtitle" x="1688" y="260">or completed workflow</text>
<text class="white-text" x="1688" y="292">Evidence, plans, dataset insights,</text>
<text class="white-text" x="1688" y="318">training steps, artifacts, caveats,</text>
<text class="white-text" x="1688" y="344">and next actions</text>

<path d="M310 268 L370 268" fill="none" stroke="#500000" stroke-width="3" marker-end="url(#arrow-blue)"/>
