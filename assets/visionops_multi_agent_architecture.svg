<text class="section" x="80" y="440">SPECIALIST AGENTS</text>
<rect x="80" y="465" width="300" height="135" rx="8" fill="#ffffff" stroke="#500000" stroke-width="2"/>
<text class="node-title" x="105" y="507">Vision Task Planner</text>
<text class="node-subtitle" x="105" y="533">vision_task_planner</text>
<text class="node-text" x="105" y="562">Task type, missing constraints,</text>
<text class="node-text" x="105" y="585">success criteria, next stage</text>

<rect x="420" y="465" width="300" height="135" rx="8" fill="#ffffff" stroke="#500000" stroke-width="2"/>
<text class="node-title" x="445" y="507">CV Research Agent</text>
<text class="node-subtitle" x="445" y="533">cv_research</text>
<text class="node-text" x="445" y="562">Hub-backed model, dataset,</text>
<text class="node-text" x="445" y="585">paper, doc, license research</text>

<rect x="760" y="465" width="300" height="135" rx="8" fill="#ffffff" stroke="#500000" stroke-width="2"/>
<text class="node-title" x="785" y="507">Data Curator Agent</text>
<text class="node-subtitle" x="785" y="533">data_curator</text>
<text class="node-text" x="785" y="562">Local import, schema, labels,</text>
<text class="node-text" x="785" y="585">views, filtering, evaluation</text>

<rect x="1100" y="465" width="300" height="135" rx="8" fill="#ffffff" stroke="#500000" stroke-width="2"/>
<text class="node-title" x="1125" y="507">ML Engineer Agent</text>
<text class="node-subtitle" x="1125" y="533">ml_engineer</text>
<text class="node-text" x="1125" y="562">Training code, debugging,</text>
<text class="node-text" x="1125" y="585">hardware, notebooks, validation</text>

<rect x="1440" y="465" width="280" height="135" rx="8" fill="#ffffff" stroke="#500000" stroke-width="2"/>
<text class="node-title" x="1465" y="507">Google Search Agent</text>
<text class="node-subtitle" x="1465" y="533">google_search_agent</text>
<text class="node-text" x="1465" y="562">Fresh web info, releases,</text>
<text class="node-text" x="1465" y="585">official docs, APIs</text>

