<rect x="1100" y="940" width="250" height="85" rx="8" fill="#fff7df" stroke="#9b6a00" stroke-width="2"/>
<text class="node-title" x="1125" y="976">Jupyter notebooks</text>
<text class="node-text" x="1125" y="1002">Interactive prototypes and plots</text>

<rect x="1390" y="940" width="250" height="85" rx="8" fill="#fff7df" stroke="#9b6a00" stroke-width="2"/>
