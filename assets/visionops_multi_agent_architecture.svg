<text class="label" x="932" y="414">agent tool calls</text>

<text class="section" x="80" y="690">TOOLS, SKILLS, AND RESOURCES</text>
<rect x="80" y="715" width="300" height="115" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-title" x="105" y="758">Planning brief</text>
<text class="node-text" x="105" y="785">Goal interpretation, risks,</text>
<text class="node-text" x="105" y="808">stages, specialist sequence</text>

<rect x="420" y="715" width="300" height="115" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-title" x="445" y="758">Hugging Face MCP</text>
<text class="node-text" x="445" y="785">models, datasets, Spaces,</text>
<text class="node-text" x="445" y="808">papers, docs, benchmarks</text>

<rect x="760" y="715" width="300" height="115" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-title" x="785" y="758">FiftyOne MCP + direct tools</text>
<text class="node-text" x="785" y="785">load/open datasets, schema,</text>
<text class="node-text" x="785" y="808">samples, labels, evaluation</text>

<rect x="1100" y="695" width="170" height="135" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-subtitle" x="1125" y="733">ADK SkillToolset</text>
<text class="small" x="1125" y="763">hardware-profiling</text>
<text class="small" x="1125" y="786">jupyter-notebook</text>
<text class="small" x="1125" y="809">run_skill_script</text>

<rect x="1290" y="695" width="170" height="135" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-subtitle" x="1315" y="733">Jupyter MCP</text>
<text class="small" x="1315" y="763">create / open</text>
<text class="small" x="1315" y="786">edit / execute</text>
<text class="small" x="1315" y="809">interact</text>

<rect x="1480" y="695" width="170" height="135" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-subtitle" x="1505" y="733">Local execution</text>
<text class="small" x="1505" y="763">workspace files</text>
<text class="small" x="1505" y="786">commands</text>
<text class="small" x="1505" y="809">validation</text>

<rect x="1670" y="695" width="300" height="135" rx="8" fill="#f7f4f0" stroke="#a7a9ac" stroke-width="2"/>
<text class="node-title" x="1695" y="737">Web / API sources</text>
<text class="node-text" x="1695" y="765">Official docs, releases,</text>
<text class="node-text" x="1695" y="788">vendor pages, APIs, and</text>
<text class="node-text" x="1695" y="811">fresh public references</text>

